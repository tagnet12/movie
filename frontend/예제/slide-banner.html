<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슬라이드 배너</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --light: #f1f1f1;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .slider-container {
            max-width: 1200px;
            width: 100%;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px var(--shadow);
            background: white;
        }

        .slider-wrapper {
            position: relative;
            height: 500px;
            overflow: hidden;
        }

        .slides {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            height: 100%;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%);
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 700px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        .slide-content p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            opacity: 0.95;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        .slide-btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.3);
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .slide-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(233, 69, 96, 0.4);
            background: #ff5675;
        }

        /* 배경 이미지 스타일 */
        .slide:nth-child(1) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .slide:nth-child(2) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .slide:nth-child(3) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .slide:nth-child(4) {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        /* 네비게이션 버튼 */
        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .nav-button:hover {
            background: white;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .nav-button.prev {
            left: 20px;
        }

        .nav-button.next {
            right: 20px;
        }

        .nav-button svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        /* 인디케이터 */
        .indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: white;
            width: 40px;
            border-radius: 6px;
        }

        .indicator:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        /* 진행 바 */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--accent);
            width: 0;
            z-index: 11;
            animation: progress 5s linear infinite;
        }

        @keyframes progress {
            from { width: 0; }
            to { width: 100%; }
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .slider-wrapper {
                height: 400px;
            }

            .slide-content h2 {
                font-size: 2rem;
            }

            .slide-content p {
                font-size: 1rem;
            }

            .nav-button {
                width: 40px;
                height: 40px;
            }

            .nav-button.prev {
                left: 10px;
            }

            .nav-button.next {
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="slider-container">
        <div class="progress-bar"></div>
        <div class="slider-wrapper">
            <div class="slides">
                <div class="slide">
                    <div class="slide-content">
                        <h2>혁신적인 디자인</h2>
                        <p>현대적이고 세련된 인터페이스로 사용자 경험을 극대화합니다</p>
                        <button class="slide-btn">자세히 보기</button>
                    </div>
                </div>
                <div class="slide">
                    <div class="slide-content">
                        <h2>강력한 성능</h2>
                        <p>빠르고 효율적인 코드로 최상의 퍼포먼스를 제공합니다</p>
                        <button class="slide-btn">시작하기</button>
                    </div>
                </div>
                <div class="slide">
                    <div class="slide-content">
                        <h2>완벽한 반응형</h2>
                        <p>모든 디바이스에서 완벽하게 작동하는 레이아웃</p>
                        <button class="slide-btn">체험하기</button>
                    </div>
                </div>
                <div class="slide">
                    <div class="slide-content">
                        <h2>쉬운 커스터마이징</h2>
                        <p>간단한 설정으로 원하는 스타일을 자유롭게 구현</p>
                        <button class="slide-btn">알아보기</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="nav-button prev" aria-label="이전 슬라이드">
            <svg viewBox="0 0 24 24">
                <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
        </button>
        <button class="nav-button next" aria-label="다음 슬라이드">
            <svg viewBox="0 0 24 24">
                <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
            </svg>
        </button>

        <div class="indicators">
            <div class="indicator active"></div>
            <div class="indicator"></div>
            <div class="indicator"></div>
            <div class="indicator"></div>
        </div>
    </div>

    <script>
        class SliderBanner {
            constructor() {
                this.currentSlide = 0;
                this.slides = document.querySelectorAll('.slide');
                this.totalSlides = this.slides.length;
                this.slidesContainer = document.querySelector('.slides');
                this.indicators = document.querySelectorAll('.indicator');
                this.progressBar = document.querySelector('.progress-bar');
                this.autoPlayInterval = null;
                this.autoPlayDelay = 5000;

                this.init();
            }

            init() {
                // 이벤트 리스너 등록
                document.querySelector('.prev').addEventListener('click', () => this.prevSlide());
                document.querySelector('.next').addEventListener('click', () => this.nextSlide());

                this.indicators.forEach((indicator, index) => {
                    indicator.addEventListener('click', () => this.goToSlide(index));
                });

                // 키보드 네비게이션
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.prevSlide();
                    if (e.key === 'ArrowRight') this.nextSlide();
                });

                // 터치 스와이프 지원
                this.addSwipeSupport();

                // 자동 재생 시작
                this.startAutoPlay();

                // 마우스 호버시 자동 재생 일시정지
                document.querySelector('.slider-container').addEventListener('mouseenter', () => {
                    this.stopAutoPlay();
                });

                document.querySelector('.slider-container').addEventListener('mouseleave', () => {
                    this.startAutoPlay();
                });
            }

            goToSlide(index) {
                this.currentSlide = index;
                this.updateSlider();
            }

            nextSlide() {
                this.currentSlide = (this.currentSlide + 1) % this.totalSlides;
                this.updateSlider();
            }

            prevSlide() {
                this.currentSlide = (this.currentSlide - 1 + this.totalSlides) % this.totalSlides;
                this.updateSlider();
            }

            updateSlider() {
                // 슬라이드 이동
                const offset = -this.currentSlide * 100;
                this.slidesContainer.style.transform = `translateX(${offset}%)`;

                // 인디케이터 업데이트
                this.indicators.forEach((indicator, index) => {
                    if (index === this.currentSlide) {
                        indicator.classList.add('active');
                    } else {
                        indicator.classList.remove('active');
                    }
                });

                // 진행바 재시작
                this.restartProgressBar();

                // 슬라이드 콘텐츠 애니메이션 재실행
                this.animateSlideContent();
            }

            animateSlideContent() {
                const currentSlideContent = this.slides[this.currentSlide].querySelector('.slide-content');
                currentSlideContent.style.animation = 'none';
                setTimeout(() => {
                    currentSlideContent.style.animation = 'slideUp 0.8s ease-out';
                }, 10);
            }

            startAutoPlay() {
                this.stopAutoPlay();
                this.autoPlayInterval = setInterval(() => {
                    this.nextSlide();
                }, this.autoPlayDelay);
            }

            stopAutoPlay() {
                if (this.autoPlayInterval) {
                    clearInterval(this.autoPlayInterval);
                    this.autoPlayInterval = null;
                }
            }

            restartProgressBar() {
                this.progressBar.style.animation = 'none';
                setTimeout(() => {
                    this.progressBar.style.animation = `progress ${this.autoPlayDelay}ms linear`;
                }, 10);
            }

            addSwipeSupport() {
                let startX = 0;
                let endX = 0;

                this.slidesContainer.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                });

                this.slidesContainer.addEventListener('touchmove', (e) => {
                    endX = e.touches[0].clientX;
                });

                this.slidesContainer.addEventListener('touchend', () => {
                    const diff = startX - endX;
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) {
                            this.nextSlide();
                        } else {
                            this.prevSlide();
                        }
                    }
                });
            }
        }

        // 슬라이더 초기화
        document.addEventListener('DOMContentLoaded', () => {
            new SliderBanner();
        });
    </script>
</body>
</html>
